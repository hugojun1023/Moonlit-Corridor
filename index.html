<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>境月迴廊 Mirrormoon Corridor Survivors</title>
<style>
  :root{
    --blood:#a4161a; --gold:#d9a441; --bone:#e8e0cc; --night:#0b0a14; --stone:#2a2438;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#050409;overflow:hidden;font-family:"Noto Serif TC","Times New Roman",serif}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{image-rendering:pixelated;background:#0b0a14;box-shadow:0 0 60px rgba(120,40,160,.25);max-width:100%;max-height:100%}
  /* ---------- overlays ---------- */
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .25s}
  .overlay.show{opacity:1;pointer-events:auto}
  #titleScreen{background:radial-gradient(ellipse at 50% 35%, rgba(60,20,90,.55), rgba(5,4,9,.92) 70%)}
  .gameTitle{font-size:clamp(34px,6vw,64px);letter-spacing:.18em;color:var(--bone);
    text-shadow:0 0 18px rgba(217,164,65,.5), 0 4px 0 #3a0d0d;font-weight:900}
  .gameTitle .red{color:var(--blood);text-shadow:0 0 22px rgba(164,22,26,.8)}
  .subTitle{margin-top:10px;color:#9b8bb4;letter-spacing:.5em;font-size:14px}
  .pressKey{margin-top:46px;color:var(--gold);font-size:18px;letter-spacing:.3em;animation:blink 1.2s steps(2) infinite}
  @keyframes blink{50%{opacity:.15}}
  .ctrlHint{margin-top:26px;color:#6f6488;font-size:13px;line-height:2;text-align:center;letter-spacing:.1em}
  /* level up cards */
  #levelUp{background:rgba(5,4,9,.78);backdrop-filter:blur(2px)}
  .luTitle{color:var(--gold);font-size:26px;letter-spacing:.4em;margin-bottom:26px;text-shadow:0 0 14px rgba(217,164,65,.6)}
  #cards{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;padding:0 16px}
  .card{width:196px;min-height:230px;background:linear-gradient(180deg,#1d1830,#120e1e);
    border:2px solid #4a3c66;border-radius:6px;padding:16px 14px;cursor:pointer;
    transition:transform .12s, border-color .12s, box-shadow .12s;position:relative}
  .card:hover{transform:translateY(-6px);border-color:var(--gold);box-shadow:0 8px 28px rgba(217,164,65,.25)}
  .card .icon{font-size:34px;text-align:center;margin-bottom:8px;filter:drop-shadow(0 0 6px rgba(217,164,65,.5))}
  .card .name{color:var(--bone);font-size:17px;text-align:center;letter-spacing:.1em;margin-bottom:4px}
  .card .lv{color:var(--gold);font-size:12px;text-align:center;margin-bottom:10px;letter-spacing:.2em}
  .card .desc{color:#9b8bb4;font-size:13px;line-height:1.7;text-align:center}
  .card.newWeapon{border-color:#7a3040}
  .card.newWeapon:hover{border-color:var(--blood);box-shadow:0 8px 28px rgba(164,22,26,.35)}
  /* game over */
  #gameOver{background:radial-gradient(ellipse at 50% 40%, rgba(90,10,15,.5), rgba(5,4,9,.95) 70%)}
  .goTitle{font-size:clamp(40px,7vw,72px);color:var(--blood);letter-spacing:.25em;font-weight:900;
    text-shadow:0 0 30px rgba(164,22,26,.9),0 4px 0 #2a0507}
  .goStats{margin-top:24px;color:var(--bone);font-size:17px;line-height:2.2;text-align:center;letter-spacing:.15em}
  .goStats b{color:var(--gold)}
  .btn{margin-top:34px;padding:12px 44px;background:transparent;border:2px solid var(--gold);color:var(--gold);
    font-size:17px;letter-spacing:.35em;cursor:pointer;font-family:inherit;transition:.15s}
  .btn:hover{background:var(--gold);color:#120e1e}
  #pauseHint{position:absolute;bottom:8px;right:14px;color:#57506e;font-size:11px;letter-spacing:.15em;pointer-events:none}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv" width="960" height="540"></canvas>

  <div id="titleScreen" class="overlay show">
    <div class="gameTitle">境月<span class="red">迴廊</span></div>
    <div class="subTitle">MIRRORMOON&nbsp;CORRIDOR&nbsp;SURVIVORS</div>
    <div class="pressKey">▶ 按 ENTER 或點擊開始 ◀</div>
    <div class="ctrlHint">← → / A D 移動 &nbsp;·&nbsp; SPACE 跳躍 &nbsp;·&nbsp; ↓＋SPACE 落下跳台 &nbsp;·&nbsp; P 暫停<br>武器自動攻擊 · 撿拾靈魂寶石升級 · 在血月之夜活下去</div>
  </div>

  <div id="levelUp" class="overlay">
    <div class="luTitle">✦ 力 量 覺 醒 ✦</div>
    <div id="cards"></div>
  </div>

  <div id="gameOver" class="overlay">
    <div class="goTitle">壯烈成仁</div>
    <div class="goStats" id="goStats"></div>
    <button class="btn" id="btnRetry">再 戰</button>
  </div>

  <div id="pauseHint">P 暫停</div>
</div>

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;
const GROUND_Y = H - 74;               // 地板頂端
const PLAYER_H = 64;                    // 畫面拉遠:角色顯示高度
const rand = (a,b)=>a+Math.random()*(b-a);
const irand = (a,b)=>Math.floor(rand(a,b+1));
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));

/* ---------- 跳台 (以區段索引決定,無限延伸且固定) ---------- */
const SEG = 400;                        // 每個區段寬度
const PLAT_H1 = GROUND_Y - 92;         // 低層跳台(地面可直接跳上)
const PLAT_H2 = GROUND_Y - 180;        // 高層樓板(需經踏板二段跳上)
// solid:true = 實心樓層,無法從下方穿越,必須從旁邊的踏板跳過去
function segPlatforms(i){
  const m = ((i%4)+4)%4;
  switch(m){
    case 0: return [{x:i*SEG+70,  y:PLAT_H1, w:170}];
    case 1: return [{x:i*SEG+20,  y:PLAT_H1, w:115},                  // 踏板
                    {x:i*SEG+195, y:PLAT_H2, w:185, solid:true}];      // 樓層
    case 2: return [{x:i*SEG+120, y:PLAT_H1, w:180}];
    default:return [{x:i*SEG+30,  y:PLAT_H2, w:180, solid:true},      // 樓層
                    {x:i*SEG+265, y:PLAT_H1, w:115}];                  // 踏板
  }
}
function platformsInRange(x0, x1){
  const out=[];
  for(let i=Math.floor(x0/SEG)-1; i<=Math.floor(x1/SEG)+1; i++)
    out.push(...segPlatforms(i));
  return out;
}

/* ---------- 音效:WebAudio 迷你合成器 ---------- */
let AC=null;
function initAudio(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
function sfx(f0, f1, dur, type='square', vol=0.12){
  if(!AC) return;
  try{
    const t = AC.currentTime;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type;
    o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(30,f1), t+dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    o.connect(g); g.connect(AC.destination);
    o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}
function sfxLevelUp(){
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>sfx(f,f,0.14,'square',0.14), i*90));
}
function sfxChest(){
  [392,523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>sfx(f,f,0.12,'triangle',0.15), i*70));
}
function addBanner(text, color='#ffd75e', size=30){

}

/* ---------- 自動索敵:回傳離玩家最近的敵人 ---------- */
function nearestEnemy(){
  let best=null, bd=Infinity;
  const px=player.x, py=player.y-PLAYER_H*0.55;
  for(const e of enemies){
    if(e.hp<=0) continue;
    const ey = e.fly? e.y : e.y-e.size/2;
    const d = (e.x-px)*(e.x-px)+(ey-py)*(ey-py);
    if(d<bd){ bd=d; best=e; }
  }
  return best;
}

function fireWeapon(w){
  const d = WEAPON_DEFS[w.type], lv = w.lv;
  const dmg = d.base.dmg * (1 + (lv-1)*0.35) * player.stats.dmg;
  const px = player.x, py = player.y-PLAYER_H*0.55;
  // 自動瞄準最近的怪物;沒有怪物時朝面向方向
  const tgt = nearestEnemy();
  const f = tgt ? (Math.sign(tgt.x-px)||player.facing) : player.facing;
  switch(w.type){
    case 'whip': {
      const len = (120 + lv*22) * player.stats.area;
      bullets.push({kind:'whip', x:px, y:py, dir:f, len, dmg, t:0, life:0.22, hit:new Set()});
      if(lv>=4) bullets.push({kind:'whip', x:px, y:py, dir:-f, len:len*0.8, dmg:dmg*0.8, t:0, life:0.22, hit:new Set()});
      break;
    }
    case 'knife': {
      const n = 1 + Math.floor(lv/2);
      // 朝最近敵人全角度射擊
      let ang = 0;
      if(tgt){
        const ty = tgt.fly? tgt.y : tgt.y-tgt.size/2;
        ang = Math.atan2(ty-py, tgt.x-px);
      } else ang = f>0?0:Math.PI;
      for(let i=0;i<n;i++){
        const a = ang + (i-(n-1)/2)*0.09;
        bullets.push({kind:'knife', x:px, y:py, vx:Math.cos(a)*720, vy:Math.sin(a)*720, dmg, pierce:1+Math.floor(lv/3), t:0, life:1.4, hit:new Set()});
      }
      break;
    }
    case 'axe': {
      const n = lv>=4 ? 2 : 1;
      for(let i=0;i<n;i++){
        bullets.push({kind:'axe', x:px, y:py, vx:f*(200+i*70), vy:-620, dmg, spin:0, pierce:99, t:0, life:2.6, hit:new Set()});
      }
      break;
    }
    case 'holy': {
      bullets.push({kind:'bottle', x:px, y:py, vx:f*260, vy:-380, dmg, lv, t:0, life:3});
      break;
    }
    case 'cross': {
      bullets.push({kind:'cross', x:px, y:py, vx:f*520, vy:0, dmg, spin:0, t:0, life:2.4, ret:false, dir:f, hit:new Set(), rehit:0});
      break;
    }
  }
}

/* ============================================================
   敵人
   ============================================================ */
const ENEMY_DEFS = {
  bat:   { hp:12,  dmg:8,  spd:150, xp:1, fly:true,  size:20, color:'#6b4fa0' },
  skel:  { hp:28,  dmg:12, spd:70,  xp:2, fly:false, size:34, color:'#cfc7b0' },
  ghost: { hp:22,  dmg:10, spd:55,  fly:true, xp:2,  size:30, color:'#8fd0d8' },
  armor: { hp:100, dmg:18, spd:38,  fly:false, xp:6, size:40, color:'#7f8aa3' },
  reaper:{ hp:700, dmg:26, spd:60,  fly:true, xp:40, size:58, color:'#c33', boss:true },
};
function spawnEnemy(type){
  const d = ENEMY_DEFS[type];
  const side = Math.random()<0.5 ? -1 : 1;
  const x = camX + W/2*side + side*rand(60,220);
  // 血量曲線:開場約 55%,約 50 秒後達 100%,之後緩慢上升
  const scale = clamp(0.55 + time/110, 0.55, 4);
  enemies.push({
    type, x,
    y: d.fly ? rand(GROUND_Y-230, GROUND_Y-80) : GROUND_Y,
    hp: d.hp*scale, hpMax:d.hp*scale, dmg:d.dmg,
    spd: d.spd*rand(0.85,1.15), fly:d.fly, size:d.size,
    xp:d.xp, boss:!!d.boss, t:rand(0,10), flash:0, phase:rand(0,6.28),
  });
}
function pickEnemyType(){
  const t = time;
  const pool = [];
  pool.push(['bat', 14]);
  if(t>25) pool.push(['skel', 7]);
  if(t>60) pool.push(['ghost', 5]);
  if(t>130) pool.push(['armor', 4]);
  let sum=0; pool.forEach(p=>sum+=p[1]);
  let r = Math.random()*sum;
  for(const [k,wt] of pool){ r-=wt; if(r<=0) return k; }
  return 'bat';
}

/* ============================================================
   升級選單
   ============================================================ */
function openLevelUp(){
  state='levelup';
  const cards = document.getElementById('cards');
  cards.innerHTML='';
  const opts = rollUpgrades(3);
  for(const o of opts){
    const el = document.createElement('div');
    el.className = 'card' + (o.isNew?' newWeapon':'');
    el.innerHTML = `<div class="icon">${o.icon}</div><div class="name">${o.name}</div>
      <div class="lv">${o.lvText}</div><div class="desc">${o.desc}</div>`;
    el.onclick = ()=>{ o.pick(); show('levelUp',false); state='play'; };
    cards.appendChild(el);
  }
  show('levelUp',true);
}
function rollUpgrades(n){
  const opts = [];
  // 現有武器升級
  for(const w of player.weapons){
    const d = WEAPON_DEFS[w.type];
    if(w.lv < d.maxLv)
      opts.push({icon:d.icon, name:d.name, lvText:`Lv.${w.lv} → Lv.${w.lv+1}`, desc:d.desc,
                 pick:()=>w.lv++});
  }
  // 新武器
  if(player.weapons.length<4){
    for(const t in WEAPON_DEFS){
      if(!player.weapons.some(w=>w.type===t))
        opts.push({icon:WEAPON_DEFS[t].icon, name:WEAPON_DEFS[t].name, lvText:'新武器!', isNew:true,
                   desc:WEAPON_DEFS[t].desc, pick:()=>player.weapons.push(makeWeapon(t))});
    }
  }
  // 被動
  for(const k in PASSIVE_DEFS){
    const d = PASSIVE_DEFS[k];
    opts.push({icon:d.icon, name:d.name, lvText:'祝福', desc:d.desc, pick:()=>d.apply(player)});
  }
  // 洗牌取 n
  for(let i=opts.length-1;i>0;i--){ const j=irand(0,i); [opts[i],opts[j]]=[opts[j],opts[i]]; }
  return opts.slice(0,n);
}

/* ============================================================
   更新
   ============================================================ */
let last = performance.now();
function loop(now){
  requestAnimationFrame(loop);
  let dt = Math.min((now-last)/1000, 0.05);
  last = now;
  frame++;
  if(state==='play' && !paused) update(dt);
  render(dt);
}
requestAnimationFrame(loop);

function update(dt){
  time += dt;
  const p = player;

  /* --- 玩家移動 --- */
  let mv = 0;
  if(keys['ArrowLeft']||keys['KeyA']) mv-=1;
  if(keys['ArrowRight']||keys['KeyD']) mv+=1;
  p.moving = mv!==0;
  if(mv!==0) p.facing = mv;
  p.vx = mv * p.speed;
  p.x += p.vx*dt;
  p.dropT = Math.max(0, p.dropT-dt);

  const plats = platformsInRange(p.x-200, p.x+200);
  const jumpKey = keys['Space']||keys['ArrowUp']||keys['KeyW'];
  const downKey = keys['ArrowDown']||keys['KeyS'];

  if(jumpKey && p.onGround){
    if(downKey && p.y < GROUND_Y){
      // 落下跳台(實心樓層不可下穿,只能走到邊緣跳下)
      const under = plats.find(pl=> p.y===pl.y && p.x>pl.x-14 && p.x<pl.x+pl.w+14);
      if(under && !under.solid){
        p.onGround=false; p.dropT=0.28; p.vy=60;
      } else {
        p.vy = -p.jumpV; p.onGround=false;
      }
    } else {
      p.vy = -p.jumpV; p.onGround=false;
    }
  }
  // 站在跳台上但走出邊緣 → 開始掉落
  if(p.onGround && p.y < GROUND_Y){
    const on = plats.some(pl=> p.y===pl.y && p.x>pl.x-14 && p.x<pl.x+pl.w+14);
    if(!on){ p.onGround=false; p.vy=0; }
  }
  if(!p.onGround){
    const prevY = p.y;
    p.vy += 1500*dt;
    p.y += p.vy*dt;
    // 上升時:實心樓層會擋住,無法從下方穿越
    if(p.vy<0){
      const headPrev = prevY - PLAYER_H, headNow = p.y - PLAYER_H;
      for(const pl of plats){
        if(!pl.solid) continue;
        const bottom = pl.y + 18;
        if(headPrev >= bottom && headNow < bottom && p.x>pl.x-6 && p.x<pl.x+pl.w+6){
          p.y = bottom + PLAYER_H;   // 撞到樓層底部
          p.vy = 40;
          break;
        }
      }
    }
    // 下落時著地(踏板單向、樓層頂面皆可)
    if(p.vy>0 && p.dropT<=0){
      for(const pl of plats){
        if(prevY <= pl.y && p.y >= pl.y && p.x>pl.x-14 && p.x<pl.x+pl.w+14){
          p.y = pl.y; p.vy=0; p.onGround=true; break;
        }
      }
    }
    if(!p.onGround && p.y>=GROUND_Y){ p.y=GROUND_Y; p.vy=0; p.onGround=true; }
  }
  p.animT += dt * (p.moving?9:4);
  p.inv = Math.max(0, p.inv-dt);
  if(p.stats.regen>0) p.hp = Math.min(p.hpMax, p.hp + p.stats.regen*dt);

  /* --- 攝影機 --- */
  camX += (p.x - camX)*Math.min(1, dt*6);

  /* --- 武器冷卻 --- */
  for(const w of p.weapons){
    w.cd -= dt;
    if(w.cd<=0){
      fireWeapon(w);
      w.cd = WEAPON_DEFS[w.type].base.cd * p.stats.cdr;
    }
  }

  /* --- 生成敵人 --- */
  spawnT -= dt;
  const interval = clamp(1.4 - time*0.009, 0.30, 1.4);
  if(spawnT<=0){
    spawnT = interval;
    const n = 2 + Math.floor(time/70);
    for(let i=0;i<n;i++) spawnEnemy(pickEnemyType());
  }
  // 怪物潮:每 30 秒湧入一波脆皮蝙蝠,是快速升級的經驗值盛宴
  swarmT -= dt;
  if(swarmT<=0){
    swarmT = 30;
    const count = 10 + Math.floor(time/45);
    for(let i=0;i<count;i++){
      spawnEnemy('bat');
      const e = enemies[enemies.length-1];
      e.hp *= 0.65; e.hpMax = e.hp;              // 潮水蝙蝠更脆
      e.x += rand(-140,140);
    }
    addBanner('🦇 怪 物 潮 來 襲 !', '#c9a0ff', 34);
    sfx(180, 60, 0.5, 'sawtooth', 0.1);
  }
  bossT -= dt;
  if(bossT<=0){ bossT = 80; spawnEnemy('reaper'); addBanner('☠ 死 神 降 臨', '#ff4455', 36); sfx(120,40,0.8,'sawtooth',0.12); }

  /* --- 敵人 AI --- */
  for(const e of enemies){
    e.t += dt; e.flash = Math.max(0,e.flash-dt);
    const dx = p.x - e.x;
    const dir = Math.sign(dx)||1;
    if(e.fly){
      if(e.type==='bat'){
        // 蝙蝠:靈活俯衝,快速跟上玩家高度
        const ty = p.y-44 + Math.sin(e.t*4+e.phase)*40;
        e.x += dir*e.spd*dt;
        e.y += clamp(ty-e.y, -130*dt, 130*dt);
      } else {
        // 幽靈 / 死神:朝玩家緩慢直線飄近,垂直移動很慢
        // 玩家跳躍時不會跟著上下彈跳,只會慢慢修正高度
        const tx = p.x, ty2 = p.y-34;
        const ddx = tx-e.x, ddy = ty2-e.y;
        const dist = Math.hypot(ddx,ddy)||1;
        const vmax = e.boss ? 42 : 34;             // 垂直速度上限 (px/s)
        e.x += (ddx/dist)*e.spd*dt;
        e.y += clamp((ddy/dist)*e.spd, -vmax, vmax)*dt
             + Math.sin(e.t*1.6+e.phase)*8*dt;     // 輕微飄浮感
      }
      e.y = clamp(e.y, 60, GROUND_Y-10);
    } else {
      e.x += dir*e.spd*dt;
      e.y = GROUND_Y;
    }
    // 碰撞玩家
    if(p.inv<=0){
      const pw=20, ph=PLAYER_H-4;
      const ey = e.fly? e.y : e.y - e.size/2;
      if(Math.abs(e.x-p.x)<(e.size/2+pw) && Math.abs(ey-(p.y-ph/2))<(e.size/2+ph/2)){
        p.hp -= e.dmg;
        p.inv = 0.9;
        shake = 8;
        sfx(200,60,0.25,'sawtooth',0.14);
        addDmg(p.x, p.y-PLAYER_H-10, e.dmg, '#ff5566');
        if(p.hp<=0){ gameOver(); return; }
      }
    }
  }

  /* --- 子彈 --- */
  for(const b of bullets){
    b.t += dt;
    switch(b.kind){
      case 'whip':
        b.x = p.x; b.y = p.y-PLAYER_H*0.55;
        break;
      case 'knife':
        b.x += b.vx*dt; b.y += b.vy*dt;
        break;
      case 'axe':
        b.vy += 1400*dt; b.x += b.vx*dt; b.y += b.vy*dt; b.spin += dt*14;
        break;
      case 'bottle':
        b.vy += 1300*dt; b.x += b.vx*dt; b.y += b.vy*dt;
        if(b.y>=GROUND_Y-6){
          flames.push({x:b.x, w:(90+b.lv*24)*p.stats.area, dmg:b.dmg, t:0, life:2.6, tick:0});
          b.t = 99;
        }
        break;
      case 'cross':
        if(!b.ret){
          b.vx *= (1-2.2*dt);                    // 去程減速
          if(Math.abs(b.vx)<40) b.ret=true;      // 折返
        } else {
          b.vx += Math.sign(p.x-b.x)*1400*dt;    // 回程朝玩家加速
        }
        b.x += b.vx*dt; b.spin += dt*10;
        b.rehit -= dt;
        if(b.rehit<=0){ b.hit.clear(); b.rehit=0.25; }
        break;
    }
    // 命中判定
    for(const e of enemies){
      if(e.hp<=0) continue;
      if(b.hit && b.hit.has(e)) continue;
      let hitOK=false;
      const ey = e.fly? e.y : e.y - e.size/2;
      if(b.kind==='whip'){
        const x0 = b.dir>0 ? b.x : b.x-b.len;
        const x1 = b.dir>0 ? b.x+b.len : b.x;
        hitOK = e.x>x0-e.size/2 && e.x<x1+e.size/2 && Math.abs(ey-b.y)<70;
      } else {
        hitOK = Math.abs(e.x-b.x)<e.size/2+16 && Math.abs(ey-b.y)<e.size/2+16;
      }
      if(hitOK){
        damageEnemy(e, b.dmg);
        if(b.hit) b.hit.add(e);
        if(b.kind==='knife'){ b.pierce--; if(b.pierce<=0) b.t=99; }
      }
    }
  }
  bullets = bullets.filter(b=>b.t<b.life && b.x>camX-W && b.x<camX+W && b.y<H+80);

  /* --- 聖水火焰 --- */
  for(const f of flames){
    f.t += dt; f.tick -= dt;
    if(f.tick<=0){
      f.tick = 0.3;
      for(const e of enemies){
        const ey = e.fly? e.y : e.y-e.size/2;
        if(Math.abs(e.x-f.x)<f.w/2+e.size/2 && ey>GROUND_Y-90) damageEnemy(e, f.dmg);
      }
    }
  }
  flames = flames.filter(f=>f.t<f.life);

  /* --- 敵人死亡處理 --- */
  for(const e of enemies){
    if(e.hp<=0 && !e.dead){
      e.dead=true; kills++;
      // 連擊!
      combo++; comboT = 2.2; comboPop = 0.25;
      if(combo===10||combo===25||combo===50||combo===100||combo===200){
        addBanner(combo+' COMBO! 連擊爆發', '#ffd75e', 32);
        sfx(880, 1320, 0.2, 'square', 0.12);
        player.xp += Math.floor(combo/5);            // 連擊里程碑直接送經驗
      }
      sfx(300, 70, 0.12, 'triangle', 0.09);
      for(let i=0;i<12;i++) particles.push({x:e.x,y:(e.fly?e.y:e.y-e.size/2),vx:rand(-160,160),vy:rand(-240,40),t:0,life:rand(.3,.7),c:ENEMY_DEFS[e.type].color});
      gems.push({x:e.x, y:e.fly?e.y:e.y-14, v:e.xp, t:0});
      if(Math.random()<0.30) gems.push({x:e.x+rand(-14,14), y:(e.fly?e.y:e.y-14)-8, coin:true, v:irand(1,3), t:0});
      if(Math.random()<0.035) pickups.push({x:e.x, y:GROUND_Y-14, kind:'heart'});
      if(Math.random()<0.015) pickups.push({x:e.x, y:GROUND_Y-14, kind:'magnet'});
      if(e.boss){
        shake=14;
        pickups.push({x:e.x, y:GROUND_Y-16, kind:'chest'});
        for(let i=0;i<3;i++) gems.push({x:e.x+rand(-30,30), y:e.y, v:10, t:0});
        addBanner('☠ 死神已被擊敗!', '#ffd75e', 34);
      }
    }
  }
  enemies = enemies.filter(e=>!e.dead);

  /* --- 寶石 / 道具 --- */
  gemT = Math.max(0, gemT-dt);
  for(const g of gems){
    g.t+=dt;
    const dx=p.x-g.x, dy=(p.y-30)-g.y, dist=Math.hypot(dx,dy);
    const pull = g.mag ? 800 : (dist < p.stats.magnet ? 420 : 0);
    if(pull){ g.x += dx/dist*pull*dt; g.y += dy/dist*pull*dt; }
    if(dist<26){
      g.got=true;
      if(g.coin){
        gold += g.v;
        sfx(1000, 1500, 0.09, 'square', 0.1);
        addDmg(g.x, g.y-14, '+'+g.v+'💰', '#ffd75e');
      } else {
        // 連續吸寶石 → 音高一路飆升,多巴胺核心
        gemStreak = gemT>0 ? Math.min(gemStreak+1, 24) : 0;
        gemT = 0.5;
        sfx(500*(1+gemStreak*0.09), 700*(1+gemStreak*0.09), 0.07, 'sine', 0.09);
        p.xp += g.v;
      }
      if(p.xp>=p.xpNeed){
        p.xp-=p.xpNeed; p.lv++;
        p.xpNeed = Math.floor(4 + p.lv*5 + p.lv*p.lv*0.45);
        // 升級金色爆發
        for(let i=0;i<26;i++){
          const a = i/26*Math.PI*2;
          particles.push({x:p.x, y:p.y-30, vx:Math.cos(a)*rand(120,260), vy:Math.sin(a)*rand(120,260)-80, t:0, life:rand(.4,.8), c:'#ffd75e'});
        }
        addBanner('✦ LEVEL UP ✦', '#ffd75e', 36);
        sfxLevelUp();
        openLevelUp();
      }
    }
  }
  gems = gems.filter(g=>!g.got);
  for(const it of pickups){
    if(Math.abs(it.x-p.x)<30 && Math.abs(it.y-(p.y-30))<60){
      it.got=true;
      if(it.kind==='heart'){ p.hp=Math.min(p.hpMax,p.hp+25); addDmg(p.x,p.y-PLAYER_H-14,'+25','#5f5'); sfx(600,900,0.15,'sine',0.12); }
      else if(it.kind==='magnet'){
        for(const g of gems) g.mag=true;
        addBanner('🧲 全場吸取!', '#7fd0ff', 30);
        sfx(300, 1200, 0.35, 'sine', 0.12);
      }
      else if(it.kind==='chest'){
        p.hp = Math.min(p.hpMax, p.hp+30);
        for(let i=0;i<12;i++) gems.push({x:it.x+rand(-20,20), y:it.y-rand(10,80), v:irand(2,4), t:0, mag:true});
        for(let i=0;i<5;i++)  gems.push({x:it.x+rand(-20,20), y:it.y-rand(10,80), coin:true, v:irand(2,5), t:0, mag:true});
        addBanner('👑 寶 藏 !', '#ffd75e', 38);
        sfxChest();
        shake = 6;
      }
    }
  }
  pickups = pickups.filter(it=>!it.got);

  /* --- 連擊 / 橫幅計時 --- */
  comboT -= dt; if(comboT<=0) combo=0;
  comboPop = Math.max(0, comboPop-dt);
  for(const b of banners) b.t += dt;
  banners = banners.filter(b=>b.t<b.life);

  /* --- 粒子 / 傷害數字 --- */
  for(const q of particles){ q.t+=dt; q.x+=q.vx*dt; q.y+=q.vy*dt; q.vy+=800*dt; }
  particles = particles.filter(q=>q.t<q.life);
  for(const d of dmgTexts){ d.t+=dt; d.y-=40*dt; }
  dmgTexts = dmgTexts.filter(d=>d.t<0.8);

  shake = Math.max(0, shake - dt*30);
}

function damageEnemy(e, dmg){
  const crit = Math.random() < 0.15;
  if(crit) dmg *= 2;
  e.hp -= dmg; e.flash = 0.12;
  const ey = (e.fly?e.y:e.y-e.size)-14;
  if(crit){
    dmgTexts.push({x:e.x, y:ey, v:Math.round(dmg)+'!', c:'#ff7433', t:0, big:true});
    sfx(700, 200, 0.1, 'square', 0.1);
  } else {
    addDmg(e.x, ey, Math.round(dmg), '#ffd75e');
    sfx(420, 180, 0.06, 'square', 0.05);
  }
}
function addDmg(x,y,v,c){ dmgTexts.push({x,y,v,c,t:0}); }
function gameOver(){
  state='gameover';
  const m = Math.floor(time/60), s = Math.floor(time%60);
  document.getElementById('goStats').innerHTML =
    `存活時間 <b>${m}:${String(s).padStart(2,'0')}</b><br>擊殺 <b>${kills}</b> 隻怪物 · 抵達 <b>Lv.${player.lv}</b>`;
  show('gameOver',true);
}

/* ============================================================
   繪製 — 惡魔城式月夜迴廊
   ============================================================ */
function render(dt){
  const sx = (Math.random()-0.5)*shake, sy=(Math.random()-0.5)*shake;
  ctx.save();
  ctx.translate(sx,sy);
  drawBackground();
  if(state!=='title'){
    drawPlatforms();
    drawFlames();
    drawGems();
    drawPickups();
    drawEnemies();
    drawPlayer();
    drawBullets();
    drawParticles();
    drawDmgTexts();
    drawHUD();
    if(paused){
      ctx.fillStyle='rgba(5,4,9,.6)'; ctx.fillRect(-20,-20,W+40,H+40);
      ctx.fillStyle='#d9a441'; ctx.font='28px "Noto Serif TC", serif';
      ctx.textAlign='center'; ctx.fillText('— 暫 停 —', W/2, H/2);
    }
  } else {
    // 標題畫面背景動畫也照畫
    drawFlames();
  }
  ctx.restore();
}

const worldX = x => x - camX + W/2;

/* ---------- 跳台:哥德式石造平台 ---------- */
function drawPlatforms(){
  const plats = platformsInRange(camX-W/2-100, camX+W/2+100);
  for(const pl of plats){
    const x = worldX(pl.x);
    if(x+pl.w<-60 || x>W+60) continue;
    if(pl.solid){
      /* 實心樓層:厚石板 + 底部拱形支撐 */
      ctx.fillStyle='#463357';
      ctx.fillRect(x, pl.y, pl.w, 18);
      ctx.fillStyle='#584270';
      ctx.fillRect(x, pl.y, pl.w, 5);
      // 磚紋(兩排交錯)
      ctx.fillStyle='rgba(0,0,0,.32)';
      for(let bx=24; bx<pl.w-4; bx+=48) ctx.fillRect(x+bx, pl.y+5, 2, 6);
      for(let bx=48; bx<pl.w-4; bx+=48) ctx.fillRect(x+bx, pl.y+11, 2, 7);
      ctx.fillRect(x, pl.y+11, pl.w, 1);
      // 底部拱形支撐
      ctx.fillStyle='#31234a';
      const arches = Math.max(2, Math.round(pl.w/90));
      for(let a=0;a<arches;a++){
        const ax = x + (a+0.5)*(pl.w/arches);
        ctx.beginPath();
        ctx.moveTo(ax-22, pl.y+18);
        ctx.quadraticCurveTo(ax, pl.y+44, ax+22, pl.y+18);
        ctx.closePath(); ctx.fill();
      }
      // 邊緣護欄小柱
      ctx.fillStyle='#584270';
      ctx.fillRect(x+2, pl.y-10, 4, 10);
      ctx.fillRect(x+pl.w-6, pl.y-10, 4, 10);
      // 上緣月光描邊
      ctx.fillStyle='rgba(217,164,65,.2)';
      ctx.fillRect(x, pl.y, pl.w, 1.5);
    } else {
      /* 單向踏板:薄石板 */
      ctx.fillStyle='#3a2b4e';
      ctx.fillRect(x, pl.y, pl.w, 12);
      ctx.fillStyle='#4a3a63';
      ctx.fillRect(x, pl.y, pl.w, 4);
      ctx.fillStyle='rgba(0,0,0,.3)';
      for(let bx=28; bx<pl.w-6; bx+=34) ctx.fillRect(x+bx, pl.y+4, 2, 8);
      // 兩端托架
      ctx.fillStyle='#2e2244';
      ctx.beginPath(); ctx.moveTo(x+4,pl.y+12); ctx.lineTo(x+18,pl.y+12); ctx.lineTo(x+11,pl.y+26); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x+pl.w-18,pl.y+12); ctx.lineTo(x+pl.w-4,pl.y+12); ctx.lineTo(x+pl.w-11,pl.y+26); ctx.closePath(); ctx.fill();
      ctx.fillStyle='rgba(217,164,65,.14)';
      ctx.fillRect(x, pl.y, pl.w, 1.5);
    }
  }
}

/* ---------- 背景:多層視差 ---------- */
function drawBackground(){
  // 夜空
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0716'); g.addColorStop(0.5,'#171030'); g.addColorStop(1,'#241636');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // 星星
  ctx.fillStyle='rgba(230,225,255,.7)';
  for(let i=0;i<60;i++){
    const x = (i*163.7 - camX*0.05) % W; const xx = x<0?x+W:x;
    const y = (i*97.3)%(H*0.55);
    const tw = 0.4+0.6*Math.abs(Math.sin(frame*0.02+i));
    ctx.globalAlpha = tw*0.8;
    ctx.fillRect(xx, y, 2, 2);
  }
  ctx.globalAlpha=1;

  // 血月
  const mx = W*0.72 - (camX*0.02)%W*0, my=96;
  const mg = ctx.createRadialGradient(mx,my,10,mx,my,110);
  mg.addColorStop(0,'rgba(255,120,90,.9)'); mg.addColorStop(0.35,'rgba(220,70,60,.45)'); mg.addColorStop(1,'rgba(220,70,60,0)');
  ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(mx,my,110,0,7); ctx.fill();
  ctx.fillStyle='#f4c9a0';
  ctx.beginPath(); ctx.arc(mx,my,44,0,7); ctx.fill();
  ctx.fillStyle='rgba(200,120,90,.35)';
  ctx.beginPath(); ctx.arc(mx-12,my-8,10,0,7); ctx.arc(mx+14,my+12,7,0,7); ctx.arc(mx+4,my-18,5,0,7); ctx.fill();

  // 遠景城堡剪影 (視差 0.15)
  drawCastleLayer(camX*0.15, '#120c22', 0);
  // 中景高塔 (視差 0.35)
  drawCastleLayer(camX*0.35+400, '#1a1230', 40);

  // 迴廊柱與拱窗 (視差 0.7)
  const p = camX*0.7, span=340;
  for(let i=Math.floor((p-W)/span); i<(p+W)/span+1; i++){
    const x = i*span - p + W/2;
    drawArchWindow(x, 120);
  }
  // 前景石柱 (視差 1.0)
  const span2=460;
  for(let i=Math.floor((camX-W)/span2); i<(camX+W)/span2+1; i++){
    const x = worldX(i*span2);
    drawPillar(x);
    drawCandle(x+130, GROUND_Y-108, i);
  }

  // 地板
  ctx.fillStyle='#241a30'; ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
  ctx.fillStyle='#332545';
  const ts=64;
  for(let i=Math.floor((camX-W)/ts); i<(camX+W)/ts+1; i++){
    const x = worldX(i*ts);
    ctx.fillRect(x+2, GROUND_Y+2, ts-4, 26);
    ctx.fillStyle = (i%2)?'#3a2b4e':'#332545';
  }
  ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fillRect(0,GROUND_Y+30,W,H);
  // 地面亮邊
  ctx.fillStyle='rgba(217,164,65,.14)'; ctx.fillRect(0,GROUND_Y,W,2);

  // 霧
  ctx.fillStyle='rgba(90,70,140,.08)';
  for(let i=0;i<3;i++){
    const fx = ((frame*0.4*(i+1) )%(W+300))-150;
    ctx.beginPath(); ctx.ellipse(fx, GROUND_Y-20-i*8, 220, 26, 0, 0, 7); ctx.fill();
  }

  // 暗角
  const vg = ctx.createRadialGradient(W/2,H/2,H*0.45,W/2,H/2,H*0.85);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.55)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}
function drawCastleLayer(off, color, lift){
  ctx.fillStyle=color;
  const span=520;
  for(let i=Math.floor((off-W)/span); i<(off+W)/span+1; i++){
    const x = i*span - off + W/2;
    const hgt = 150 + (i*37%3)*40 + lift;
    const by = GROUND_Y - 40;
    ctx.fillRect(x, by-hgt, 90, hgt);
    // 城垛
    for(let j=0;j<5;j++) ctx.fillRect(x+j*20, by-hgt-12, 12, 12);
    // 尖塔
    ctx.beginPath(); ctx.moveTo(x+140, by); ctx.lineTo(x+140, by-hgt-60);
    ctx.lineTo(x+170, by-hgt-130); ctx.lineTo(x+200, by-hgt-60); ctx.lineTo(x+200, by); ctx.fill();
  }
}
function drawArchWindow(x, y){
  // 拱形窗透月光
  ctx.fillStyle='rgba(120,90,200,.10)';
  ctx.beginPath();
  ctx.moveTo(x-34, y+180); ctx.lineTo(x-34, y+60);
  ctx.arc(x, y+60, 34, Math.PI, 0);
  ctx.lineTo(x+34, y+180); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(60,45,90,.8)'; ctx.lineWidth=5; ctx.stroke();
  ctx.strokeStyle='rgba(60,45,90,.6)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(x,y+26); ctx.lineTo(x,y+180); ctx.moveTo(x-34,y+100); ctx.lineTo(x+34,y+100); ctx.stroke();
  // 月光斜落
  ctx.fillStyle='rgba(160,140,230,.05)';
  ctx.beginPath();
  ctx.moveTo(x-34,y+60); ctx.lineTo(x+34,y+60); ctx.lineTo(x+90,GROUND_Y); ctx.lineTo(x-8,GROUND_Y);
  ctx.closePath(); ctx.fill();
}
function drawPillar(x){
  ctx.fillStyle='#1c1428';
  ctx.fillRect(x-20, 0, 40, GROUND_Y);
  ctx.fillStyle='#251a36';
  ctx.fillRect(x-16, 0, 8, GROUND_Y);
  ctx.fillStyle='#2e2244';
  ctx.fillRect(x-26, GROUND_Y-26, 52, 26);
  ctx.fillRect(x-26, 0, 52, 20);
}
function drawCandle(x, y, seed){
  ctx.fillStyle='#43324f';
  ctx.fillRect(x-3, y, 6, 60);
  ctx.fillRect(x-16, y+2, 32, 5);
  ctx.fillStyle='#d9cfae';
  ctx.fillRect(x-14, y-16, 5, 18); ctx.fillRect(x+9, y-16, 5, 18); ctx.fillRect(x-2.5, y-24, 5, 24);
  // 火焰
  const fl = Math.sin(frame*0.25+seed*2)*2;
  for(const [cx,cy] of [[x-11.5,y-16],[x+11.5,y-16],[x,y-24]]){
    const fg = ctx.createRadialGradient(cx,cy-6,1,cx,cy-6,12);
    fg.addColorStop(0,'rgba(255,220,120,.95)'); fg.addColorStop(0.4,'rgba(255,140,50,.5)'); fg.addColorStop(1,'rgba(255,140,50,0)');
    ctx.fillStyle=fg;
    ctx.beginPath(); ctx.ellipse(cx, cy-6+fl*0.4, 5, 9+fl, 0, 0, 7); ctx.fill();
  }
}

/* ---------- 玩家 ---------- */
function drawPlayer(){
  const p=player;
  let list;
  if(!p.onGround) list = ANIM.jump;
  else if(p.inv>0.55) list = p.facing>0?ANIM.hurtR:ANIM.hurtL;
  else if(p.moving) list = p.facing>0?ANIM.walkR:ANIM.walkL;
  else list = p.facing>0?ANIM.idleR:ANIM.idleL;
  const key = list[Math.floor(p.animT)%list.length];
  const im = IMGS[key];
  if(!im || !im.complete) return;
  const dh = PLAYER_H, dw = im.width*(dh/im.height);
  const x = worldX(p.x)-dw/2, y = p.y-dh;
  if(p.inv>0 && Math.floor(frame/4)%2===0) ctx.globalAlpha=0.45;
  // 影子(貼齊腳下的跳台或地面)
  if(p.onGround){
    ctx.fillStyle='rgba(0,0,0,.4)';
    ctx.beginPath(); ctx.ellipse(worldX(p.x), p.y+5, 19, 5, 0, 0, 7); ctx.fill();
  }
  ctx.drawImage(im, x, y, dw, dh);
  ctx.globalAlpha=1;
}

/* ---------- 敵人繪製 (像素風程序繪製) ---------- */
function drawEnemies(){
  for(const e of enemies){
    const x = worldX(e.x);
    if(x<-100||x>W+100) continue;
    const flash = e.flash>0;
    ctx.save();
    if(flash){ ctx.filter='brightness(2.4)'; }
    switch(e.type){
      case 'bat': drawBat(x,e); break;
      case 'skel': drawSkel(x,e); break;
      case 'ghost': drawGhost(x,e); break;
      case 'armor': drawArmor(x,e); break;
      case 'reaper': drawReaper(x,e); break;
    }
    ctx.restore();
    // 血條(菁英與Boss)
    if(e.boss || e.hp<e.hpMax){
      const yy = (e.fly?e.y:e.y-e.size) - e.size/2 - 10;
      const w = e.boss? 70 : 36;
      ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(x-w/2, yy, w, 4);
      ctx.fillStyle= e.boss?'#e33':'#c94';
      ctx.fillRect(x-w/2, yy, w*clamp(e.hp/e.hpMax,0,1), 4);
    }
  }
}
function drawBat(x,e){
  const y=e.y, s=e.size/26;
  const wf = Math.sin(e.t*16)*10*s;
  ctx.fillStyle='#3a2b56';
  ctx.beginPath(); ctx.moveTo(x-4*s,y); ctx.lineTo(x-20*s, y-8*s+wf); ctx.lineTo(x-10*s,y+2*s); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+4*s,y); ctx.lineTo(x+20*s, y-8*s+wf); ctx.lineTo(x+10*s,y+2*s); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#5a4380'; ctx.fillRect(x-6*s,y-6*s,12*s,12*s);
  ctx.fillStyle='#f33'; ctx.fillRect(x-4*s,y-2*s,3*s,3*s); ctx.fillRect(x+1*s,y-2*s,3*s,3*s);
  ctx.fillStyle='#5a4380';
  ctx.fillRect(x-6*s,y-9*s,3*s,4*s); ctx.fillRect(x+3*s,y-9*s,3*s,4*s);
}
function drawSkel(x,e){
  const y=e.y, s=e.size/44;
  const step = Math.sin(e.t*8)*4*s;
  ctx.fillStyle='#d8d0b8';
  ctx.fillRect(x-8*s, y-44*s, 16*s, 14*s);          // 頭
  ctx.fillStyle='#111'; ctx.fillRect(x-5*s,y-40*s,4*s,4*s); ctx.fillRect(x+2*s,y-40*s,4*s,4*s);
  ctx.fillStyle='#c8c0a8';
  ctx.fillRect(x-2*s, y-30*s, 4*s, 12*s);           // 脊椎
  ctx.fillRect(x-9*s, y-28*s, 18*s, 3*s);           // 肋
  ctx.fillRect(x-8*s, y-23*s, 16*s, 3*s);
  ctx.fillRect(x-7*s, y-18*s, 14*s, 3*s);
  ctx.fillRect(x-6*s+step, y-14*s, 4*s, 14*s);      // 腿
  ctx.fillRect(x+2*s-step, y-14*s, 4*s, 14*s);
  ctx.fillRect(x-13*s, y-28*s, 3*s, 12*s);          // 手
  ctx.fillRect(x+10*s, y-28*s, 3*s, 12*s);
}
function drawGhost(x,e){
  const y=e.y, s=e.size/38;
  ctx.globalAlpha = 0.55+Math.sin(e.t*3)*0.15;
  ctx.fillStyle='#aee4ea';
  ctx.beginPath(); ctx.arc(x, y-6*s, 13*s, Math.PI, 0);
  const wob=Math.sin(e.t*6)*3*s;
  ctx.lineTo(x+13*s, y+10*s);
  ctx.lineTo(x+7*s, y+6*s+wob); ctx.lineTo(x, y+11*s-wob); ctx.lineTo(x-7*s, y+6*s+wob); ctx.lineTo(x-13*s, y+10*s);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#155'; ctx.fillRect(x-7*s,y-9*s,4*s,5*s); ctx.fillRect(x+3*s,y-9*s,4*s,5*s);
  ctx.globalAlpha=1;
}
function drawArmor(x,e){
  const y=e.y, s=e.size/52;
  ctx.fillStyle='#6b7690';
  ctx.fillRect(x-10*s, y-50*s, 20*s, 16*s);           // 頭盔
  ctx.fillStyle='#f80'; ctx.fillRect(x-6*s, y-45*s, 12*s, 3*s); // 眼縫
  ctx.fillStyle='#59627a';
  ctx.fillRect(x-13*s, y-32*s, 26*s, 20*s);           // 胸甲
  ctx.fillStyle='#6b7690';
  ctx.fillRect(x-16*s, y-32*s, 5*s, 14*s); ctx.fillRect(x+11*s, y-32*s, 5*s, 14*s);
  const step=Math.sin(e.t*5)*3*s;
  ctx.fillRect(x-9*s+step, y-12*s, 7*s, 12*s); ctx.fillRect(x+2*s-step, y-12*s, 7*s, 12*s);
  // 大劍
  ctx.fillStyle='#9aa4bc'; ctx.fillRect(x+16*s, y-52*s, 4*s, 34*s);
  ctx.fillStyle='#443'; ctx.fillRect(x+12*s, y-20*s, 12*s, 4*s);
}
function drawReaper(x,e){
  const y=e.y, s=e.size/74;
  ctx.globalAlpha=0.92;
  ctx.fillStyle='#1a1024';
  ctx.beginPath();
  ctx.moveTo(x-22*s, y+26*s);
  ctx.quadraticCurveTo(x-30*s, y-30*s, x, y-36*s);
  ctx.quadraticCurveTo(x+30*s, y-30*s, x+22*s, y+26*s);
  const wob=Math.sin(e.t*5)*4*s;
  ctx.lineTo(x+12*s, y+18*s+wob); ctx.lineTo(x, y+26*s-wob); ctx.lineTo(x-12*s, y+18*s+wob);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(x, y-18*s, 11*s, 0, 7); ctx.fill();
  ctx.fillStyle='#f2303a';
  ctx.fillRect(x-6*s, y-21*s, 4*s, 4*s); ctx.fillRect(x+2*s, y-21*s, 4*s, 4*s);
  // 鐮刀
  ctx.strokeStyle='#c9d2e0'; ctx.lineWidth=4*s;
  ctx.beginPath(); ctx.moveTo(x+20*s, y+20*s); ctx.lineTo(x+30*s, y-40*s); ctx.stroke();
  ctx.beginPath(); ctx.arc(x+16*s, y-40*s, 15*s, -0.4, Math.PI*0.9); ctx.stroke();
  ctx.globalAlpha=1;
}

/* ---------- 子彈 ---------- */
function drawBullets(){
  for(const b of bullets){
    const x = worldX(b.x);
    switch(b.kind){
      case 'whip': {
        const prog = Math.sin((b.t/b.life)*Math.PI);
        const len = b.len*prog;
        ctx.strokeStyle='#e8dcc0'; ctx.lineWidth=5; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(x, b.y);
        const segs=6;
        for(let i=1;i<=segs;i++){
          const t=i/segs;
          ctx.lineTo(x + b.dir*len*t, b.y + Math.sin(t*Math.PI*1.2 + b.t*30)*10*(1-prog));
        }
        ctx.stroke();
        ctx.fillStyle='#ffd75e';
        ctx.beginPath(); ctx.arc(x+b.dir*len, b.y, 6, 0, 7); ctx.fill();
        break;
      }
      case 'knife':
        ctx.save(); ctx.translate(x,b.y);
        ctx.rotate(Math.atan2(b.vy,b.vx));
        ctx.fillStyle='#dfe6ef'; ctx.fillRect(-2, -2, 16, 4);
        ctx.fillStyle='#8a6b3a'; ctx.fillRect(-8, -3, 6, 6);
        ctx.restore();
        break;
      case 'axe':
        ctx.save(); ctx.translate(x,b.y); ctx.rotate(b.spin);
        ctx.fillStyle='#8a6b3a'; ctx.fillRect(-3,-16,6,32);
        ctx.fillStyle='#cfd6e2';
        ctx.beginPath(); ctx.moveTo(0,-16); ctx.quadraticCurveTo(20,-12,16,4); ctx.lineTo(0,-4); ctx.closePath(); ctx.fill();
        ctx.restore();
        break;
      case 'bottle':
        ctx.save(); ctx.translate(x,b.y); ctx.rotate(b.t*8);
        ctx.fillStyle='#6db3e8'; ctx.fillRect(-5,-8,10,14);
        ctx.fillStyle='#e8dcc0'; ctx.fillRect(-2,-13,4,6);
        ctx.restore();
        break;
      case 'cross':
        ctx.save(); ctx.translate(x,b.y); ctx.rotate(b.spin);
        ctx.fillStyle='#ffd75e';
        ctx.fillRect(-4,-14,8,28); ctx.fillRect(-11,-5,22,8);
        ctx.restore();
        break;
    }
  }
}
function drawFlames(){
  for(const f of flames){
    const x=worldX(f.x);
    const alpha = f.t<0.3? f.t/0.3 : (f.life-f.t)<0.5? (f.life-f.t)/0.5 : 1;
    for(let i=0;i<Math.floor(f.w/14);i++){
      const fx = x - f.w/2 + i*14 + 7;
      const h = 26 + Math.sin(frame*0.3+i*2.3)*10;
      const fg = ctx.createLinearGradient(0,GROUND_Y,0,GROUND_Y-h);
      fg.addColorStop(0,'rgba(70,140,255,'+(0.75*alpha)+')');
      fg.addColorStop(0.5,'rgba(160,220,255,'+(0.6*alpha)+')');
      fg.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=fg;
      ctx.beginPath();
      ctx.moveTo(fx-7,GROUND_Y); ctx.quadraticCurveTo(fx, GROUND_Y-h*1.4, fx+7, GROUND_Y);
      ctx.fill();
    }
  }
}
function drawGems(){
  for(const g of gems){
    const x=worldX(g.x);
    const bob = Math.sin(frame*0.1+g.x)*3;
    if(g.coin){
      // 金幣:旋轉閃光
      const sq = Math.abs(Math.sin(frame*0.08+g.x*0.1));
      ctx.save(); ctx.translate(x, g.y+bob);
      ctx.fillStyle='#ffd75e'; ctx.shadowColor='#ffd75e'; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.ellipse(0,0, 6*Math.max(0.25,sq), 6, 0, 0, 7); ctx.fill();
      ctx.fillStyle='#b8860b';
      ctx.beginPath(); ctx.ellipse(0,0, 3.4*Math.max(0.25,sq), 3.4, 0, 0, 7); ctx.fill();
      ctx.restore(); ctx.shadowBlur=0;
      continue;
    }
    const big = g.v>=6;
    ctx.save(); ctx.translate(x, g.y+bob);
    ctx.rotate(Math.PI/4);
    const s = big?9:6;
    ctx.fillStyle = big? '#e84fd0' : '#4fd0e8';
    ctx.shadowColor = big? '#e84fd0':'#4fd0e8'; ctx.shadowBlur=10;
    ctx.fillRect(-s/2,-s/2,s,s);
    ctx.restore();
  }
  ctx.shadowBlur=0;
}
function drawPickups(){
  for(const it of pickups){
    const x=worldX(it.x);
    const bob=Math.sin(frame*0.1)*3;
    const y=it.y+bob;
    if(it.kind==='heart'){
      ctx.fillStyle='#e33'; ctx.shadowColor='#e33'; ctx.shadowBlur=12;
      ctx.beginPath();
      ctx.arc(x-5,y-3,6,0,7); ctx.arc(x+5,y-3,6,0,7);
      ctx.moveTo(x-10,y); ctx.lineTo(x,y+12); ctx.lineTo(x+10,y);
      ctx.fill();
    } else if(it.kind==='magnet'){
      ctx.strokeStyle='#7fd0ff'; ctx.shadowColor='#7fd0ff'; ctx.shadowBlur=12;
      ctx.lineWidth=5;
      ctx.beginPath(); ctx.arc(x, y, 9, Math.PI*0.15, Math.PI*0.85, true); ctx.stroke();
      ctx.fillStyle='#e8e0cc';
      ctx.fillRect(x-11.5, y+2, 5, 6); ctx.fillRect(x+6.5, y+2, 5, 6);
    } else if(it.kind==='chest'){
      const glow = 10+Math.sin(frame*0.15)*5;
      ctx.shadowColor='#ffd75e'; ctx.shadowBlur=glow;
      ctx.fillStyle='#7a4a1e';
      ctx.fillRect(x-14, it.y-10, 28, 18);
      ctx.fillStyle='#a4691e';
      ctx.fillRect(x-14, it.y-14, 28, 8);
      ctx.fillStyle='#ffd75e';
      ctx.fillRect(x-3, it.y-8, 6, 8);
      ctx.fillRect(x-14, it.y-7, 28, 2);
    }
    ctx.shadowBlur=0;
  }
}
function drawParticles(){
  for(const q of particles){
    ctx.globalAlpha = 1-q.t/q.life;
    ctx.fillStyle=q.c;
    ctx.fillRect(worldX(q.x)-2, q.y-2, 4, 4);
  }
  ctx.globalAlpha=1;
}
function drawDmgTexts(){
  ctx.textAlign='center';
  for(const d of dmgTexts){
    const pop = d.big ? (d.t<0.12? 1+(0.12-d.t)*6 : 1) : 1;
    ctx.font = 'bold '+Math.round((d.big?20:15)*pop)+'px monospace';
    ctx.globalAlpha = 1-d.t/0.8;
    ctx.fillStyle='#000'; ctx.fillText(d.v, worldX(d.x)+1, d.y+1);
    ctx.fillStyle=d.c; ctx.fillText(d.v, worldX(d.x), d.y);
  }
  ctx.globalAlpha=1;
}

/* ---------- HUD ---------- */
function drawHUD(){
  const p=player;
  // 血條 (惡魔城分段式)
  ctx.fillStyle='rgba(5,4,9,.7)'; ctx.fillRect(14,14,240,54);
  ctx.strokeStyle='#4a3c66'; ctx.strokeRect(14.5,14.5,240,54);
  ctx.fillStyle='#d9a441'; ctx.font='12px monospace'; ctx.textAlign='left';
  ctx.fillText('PLAYER', 24, 30);
  const segs=20, sw=10;
  for(let i=0;i<segs;i++){
    const filled = p.hp/p.hpMax > i/segs;
    ctx.fillStyle = filled? '#c9202a' : '#2a1220';
    ctx.fillRect(24+i*(sw+1), 36, sw, 10);
  }
  // XP 條
  ctx.fillStyle='#221a38'; ctx.fillRect(24, 52, 218, 7);
  ctx.fillStyle='#4fd0e8'; ctx.fillRect(24, 52, 218*clamp(p.xp/p.xpNeed,0,1), 7);
  ctx.fillStyle='#9b8bb4'; ctx.fillText('Lv.'+p.lv, 205, 30);

  // 中央計時
  const m=Math.floor(time/60), s=Math.floor(time%60);
  ctx.font='bold 24px monospace'; ctx.textAlign='center';
  ctx.fillStyle='#000'; ctx.fillText(`${m}:${String(s).padStart(2,'0')}`, W/2+1, 37);
  ctx.fillStyle='#e8e0cc'; ctx.fillText(`${m}:${String(s).padStart(2,'0')}`, W/2, 36);

  // 擊殺數與金幣
  ctx.font='14px monospace'; ctx.textAlign='right';
  ctx.fillStyle='#d9a441'; ctx.fillText('☠ '+kills, W-20, 32);
  ctx.fillStyle='#ffd75e'; ctx.fillText('💰 '+gold, W-20, 52);

  // 連擊(越高越大越紅)
  if(combo>=5){
    const pop = 1 + comboPop*2.4;
    const heat = clamp(combo/60, 0, 1);
    ctx.font = 'bold '+Math.round((20+heat*14)*pop)+'px monospace';
    ctx.textAlign='right';
    const r = Math.round(255), g2 = Math.round(215-heat*140), b2 = Math.round(94-heat*60);
    ctx.fillStyle='#000'; ctx.fillText(combo+' COMBO', W-19, 86+1);
    ctx.fillStyle=`rgb(${r},${g2},${b2})`; ctx.fillText(combo+' COMBO', W-20, 86);
    // 連擊倒數細條
    ctx.fillStyle='rgba(255,215,94,.5)';
    ctx.fillRect(W-120, 94, 100*clamp(comboT/2.2,0,1), 3);
  }

  // 中央橫幅
  ctx.textAlign='center';
  for(const b of banners){
    const fade = b.t<0.15 ? b.t/0.15 : (b.life-b.t)<0.4 ? (b.life-b.t)/0.4 : 1;
    const pop = b.t<0.15 ? 1+(0.15-b.t)*3 : 1;
    ctx.globalAlpha = fade;
    ctx.font = 'bold '+Math.round(b.size*pop)+'px "Noto Serif TC", serif';
    ctx.fillStyle='#000'; ctx.fillText(b.text, W/2+2, H*0.30+2);
    ctx.fillStyle=b.color; ctx.fillText(b.text, W/2, H*0.30);
  }
  ctx.globalAlpha=1;

  // 武器欄
  ctx.textAlign='left'; ctx.font='16px serif';
  let wx=16;
  for(const w of p.weapons){
    ctx.fillStyle='rgba(5,4,9,.65)'; ctx.fillRect(wx, H-40, 58, 28);
    ctx.strokeStyle='#4a3c66'; ctx.strokeRect(wx+.5, H-40+.5, 58, 28);
    ctx.fillStyle='#e8e0cc';
    ctx.fillText(WEAPON_DEFS[w.type].icon, wx+6, H-19);
    ctx.fillStyle='#d9a441'; ctx.font='11px monospace';
    ctx.fillText('Lv'+w.lv, wx+30, H-20);
    ctx.font='16px serif';
    wx+=64;
  }
}
